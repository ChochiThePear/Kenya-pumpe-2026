<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Feliz Cumpleaños Kenya</title>

    <style>
        .galeria {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 20px auto;
        }

        .galeria img {
            width: 100%;
            border-radius: 10px;
        }

        body {
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("animesher.com_cielo-azul-brillo-gif-1651376.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        h1 {
            font-size: 50px;
            color: yellow;
            -webkit-text-stroke: 1px black;
            text-shadow: 2px 2px 5px black;
        }

        p {
            font-size: 20px;
            text-shadow: 1px 1px 3px black;
        }

        img {
            width: 300px;
            margin: 20px auto;
            display: block;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: pink;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .pantalla {
            display: none;
        }

        .activa {
            display: block;
        }
    </style>
</head>
<body>

<!-- 🎵 AUDIO -->
<audio id="musica"></audio>

    <!-- Pantalla 1 -->
    <div id="pantalla1" class="pantalla activa">
        <h1>✨🎉 Feliz Cumpleaños Kenya 🎉✨</h1>
        <p>Ya no te enojes conmigo 🥺</p>
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 2 -->
    <div id="pantalla2" class="pantalla">
        <h1>Perdon</h1>
        <p>Al chile si se me olvido</p>
        <p>(。﹏。*)</p>
        <img src="uwu.png">
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 3 -->
    <div id="pantalla3" class="pantalla">
        <h1>Pero te tengo algo mejor</h1>
        <p>Para que se te pase la decepcion</p>
        <p>(。﹏。*)</p>
        <img src="gato-saltando-uwu.gif"> <!-- 🔥 corregido -->
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 4 -->
    <div id="pantalla4" class="pantalla">
        <h1>Recupere esto</h1>
        <p>Tenemos que tomarnos fotos juntos, no tenemos xd</p>
        
        <div class="galeria">
            <img src="Captura_de_pantalla_(717).png">
            <img src="Captura_de pantalla_(184).png">
            <img src="Captura_de_pantalla_(79).png">
            <img src="2025-08-19_00.29.17.png">
        </div>
        
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 5 -->
    <div id="pantalla5" class="pantalla">
        <h1>🎂TQM Kenya🎂</h1>
        <img src="caritas.png">
        <p>Aunque se me olvidó... </p>
    </div>

<script>
let canciones = [
    "C418-Dry-Hands.mp3",
    "PoPiPo.mp3",
    "Flutey(World-Map)-Castle-Crashers.mp3",
    "StardewValley-OST-Flower-Dance.mp3",
];

let indiceCancion = 0;
let actual = 1;

function siguiente() {

    // 🎵 cambiar canción
    let audio = document.getElementById("musica");
    audio.src = canciones[indiceCancion];
    audio.play();

    indiceCancion++;
    if (indiceCancion >= canciones.length) {
        indiceCancion = 0;
    }

    // 🎬 cambiar pantalla
    document.getElementById("pantalla" + actual).classList.remove("activa");
    actual++;
    document.getElementById("pantalla" + actual).classList.add("activa");
}
</script>

</body>
</html>
