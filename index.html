<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Kenya</title>

    <style>
        .galeria {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        .galeria img {
            width: 100%;
            border-radius: 10px;
        }

        body {
            padding: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("animesher.com_cielo-azul-brillo-gif-1651376.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        h1 {
            font-size: 8vw;
            color: yellow;
            -webkit-text-stroke: 1px black;
            text-shadow: 2px 2px 5px black;
        }

        p {
            font-size: 4.5vw;
            text-shadow: 1px 1px 3px black;
        }

        img {
            width: 80%;
            max-width: 300px;
            margin: 20px auto;
            display: block;
        }

        button {
            font-size: 5vw;
            padding: 12px 20px;
            background-color: pink;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .pantalla {
            display: none;
        }

        .activa {
            display: block;
        }

        @media (max-width: 600px) {
            .galeria {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 10vw;
            }

            p {
                font-size: 5vw;
            }
        }
    </style>
</head>
<body>

<!-- 🎵 AUDIO (puedes quitar controls después de probar) -->
<audio id="musica" controls></audio>

    <!-- Pantalla 1 -->
    <div id="pantalla1" class="pantalla activa">
        <h1>✨🎉 Feliz Cumpleaños Kenya 🎉✨</h1>
        <p>Ya no te enojes conmigo 🥺</p>
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 2 -->
    <div id="pantalla2" class="pantalla">
        <h1>Perdon</h1>
        <p>Al chile si se me olvido</p>
        <p>(。﹏。*)</p>
        <img src="uwu.png">
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 3 -->
    <div id="pantalla3" class="pantalla">
        <h1>Pero te tengo algo mejor</h1>
        <p>Para que se te pase la decepcion</p>
        <p>(。﹏。*)</p>
        <img src="gato-saltando-uwu.gif">
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 4 -->
    <div id="pantalla4" class="pantalla">
        <h1>Recupere esto</h1>
        <p>Tenemos que tomarnos fotos junto, no tenemos xd</p>
        
        <div class="galeria">
            <img src="Captura_de_pantalla_(717).png">
            <img src="Captura_de pantalla_(184).png">
            <img src="Captura_de_pantalla_(79).png">
            <img src="2025-08-19_00.29.17.png">
        </div>
        
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 5 -->
    <div id="pantalla5" class="pantalla">
        <h1>🎂TQM Kenya🎂</h1>
        <img src="caritas.png">
        <p>Aunque se me olvidó... </p>
    </div>

<script>
let canciones = [
    "musica1.mp3",
    "musica2.mp3",
    "musica3.mp3",
    "musica4.mp3",
    "musica5.mp3"
];

let indiceCancion = 0;
let actual = 1;

function siguiente() {

    let audio = document.getElementById("musica");

    // 🎵 cambiar canción con manejo de error
    if (canciones[indiceCancion]) {
        audio.src = canciones[indiceCancion];
        
        audio.play().catch(error => {
            console.log("Error al reproducir:", error);
        });
    }

    indiceCancion++;
    if (indiceCancion >= canciones.length) {
        indiceCancion = 0;
    }

    // 🎬 cambiar pantalla
    document.getElementById("pantalla" + actual).classList.remove("activa");
    actual++;
    document.getElementById("pantalla" + actual).classList.add("activa");
}
</script>

</body>
</html>
