<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Feliz Cumpleaños Kenya</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("animesher.com_cielo-azul-brillo-gif-1651376.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        h1 {
            font-size: 50px;
            color: yellow;
            -webkit-text-stroke: 1px black;
            text-shadow: 2px 2px 5px black;
        }

        p {
            font-size: 20px;
            text-shadow: 1px 1px 3px black;
        }

        img {
            width: 300px;
            margin: 20px auto;
            display: block;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: pink;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .pantalla {
            display: none;
        }

        .activa {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Pantalla 1 -->
    <div id="pantalla1" class="pantalla activa">
        <h1>🎉 Feliz Cumpleaños Kenya 🎉</h1>
        <p>Tengo algo que decirte 👀</p>
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 2 -->
    <div id="pantalla2" class="pantalla">
        <h1>💖 Sorpresa 💖</h1>
        <p>Espero que tengas un día increíble 🥳</p>
        <img src="gato-saltando-uwu.gif">
        <button onclick="siguiente()">Siguiente</button>
    </div>

    <!-- Pantalla 3 -->
    <div id="pantalla3" class="pantalla">
        <h1>🎂 Mensaje Final 🎂</h1>
        <p>Aunque se me olvidó... se te quiere 😅</p>
    </div>

    <script>
        let actual = 1;

        function siguiente() {
            document.getElementById("pantalla" + actual).classList.remove("activa");
            actual++;
            document.getElementById("pantalla" + actual).classList.add("activa");
        }
    </script>

</body>
</html>
